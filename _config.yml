# Site wide configuration

title: "Kaushal Choudhary"
description: "Unfolding the shear madness of Articial Intelligence Step-by-Step!!"
logo: # 120x120 px default image used for Twitter summary card
teaser: #ivy.png # 400x250 px default teaser image used in image archive grid
locale: en
url:
feed:
  path: atom.xml

# Jekyll configuration

sass:
  sass_dir: _sass
  style: compressed
permalink: /:categories/:title/
kramdown:
  toc_levels: 1..2
highlighter: rouge
plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed

# Site owner
owner: 
  name: Kaushal Choudhary
  email: kaushalc64@gmail.com
  twitter: kumarkaushal_
  google:
    ad-client:
    ad-slot:
  bio: Break and Reverse-Engineer ML
  avatar: photo.png # 160x160 px image for author byline
  disqus-shortname: 


include:
  - .htaccess
  - _pages
exclude:
  - "*.less"
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - config
  - gulpfile.js
  - lib
  - log
  - node_modules
  - package.json
  - spec
  - tmp
