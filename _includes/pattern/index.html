<style>  
.q-wrapper {
    position: relative; /* Changed to relative for better flow within the page */
    margin: 0 auto; /* Center horizontally */
    max-width: 400px; /* Adjust max-width as needed */
    padding: 20px; /* Add padding for spacing */
    box-sizing: border-box; /* Ensure padding doesn't affect width */
}

.q-container {
    background-color: bisque;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(90, 90, 100, 0.4);
    overflow: hidden; /* Ensure content doesn't overflow */
}

.q-container div {
    position: relative;
    padding-top: 100%; /* Maintain square aspect ratio for each div */
}

/* Clip-path styles */
.quad-circle-1 {
    clip-path: circle(100% at 0 0);
}

.quad-circle-2 {
    clip-path: circle(100% at 100% 0);
}

.quad-circle-3 {
    clip-path: circle(100% at 100% 100%);
}

.quad-circle-4 {
    clip-path: circle(100% at 0 100%);
}

.triangle-1 {
    clip-path: polygon(0 0, 0% 100%, 100% 0);
}

.triangle-2 {
    clip-path: polygon(0 0, 100% 0%, 100% 100%);
}

.triangle-3 {
    clip-path: polygon(0 100%, 100% 0%, 100% 100%);
}

.triangle-4 {
    clip-path: polygon(0 0, 0% 100%, 100% 100%);
}

.circle {
    border-radius: 50%;
}

</style>

<script>
    const shapes = [
    "quad-circle-1",
    "quad-circle-2",
    "quad-circle-3",
    "quad-circle-4",
    "triangle-1",
    "triangle-2",
    "triangle-3",
    "triangle-4",
    "circle"
];

const colors = ["#000000", "#333333", "#666666", "#999999", "#CCCCCC", "#FFFFFF"];
const boxes = document.querySelectorAll(".q-container div");

let generatePattern = () => {
    boxes.forEach((box) => {
        box.className = "";
        let i = Math.floor(Math.random() * shapes.length);
        let j = Math.floor(Math.random() * colors.length);
        box.classList.add(shapes[i]);
        box.style.backgroundColor = colors[j];
    });
};

window.addEventListener("load", () => {
    generatePattern(); // Generate pattern immediately on load
    setInterval(generatePattern, 2000); // Generate pattern every 2 seconds
});

</script>
